<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PREXIA | Assistente Clínico</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #081a4b;
      --bg-secondary: #0c1f57;
      --panel: #1b2f68;
      --panel-soft: #23397a;
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-soft: #dce6ff;
      --accent: #ff7a00;
      --accent-hover: #ff8d22;
      --danger: #9b1c1c;
      --danger-soft: #b3261e;
      --input-bg: #f2f2f5;
      --input-text: #2d2d2d;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
      --radius-xl: 24px;
      --radius-lg: 20px;
      --radius-md: 16px;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 10px 24px 14px;
      text-align: center;
      background: rgba(0, 0, 0, 0.04);
    }

    .brand {
      color: var(--accent);
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .subtitle {
      color: var(--text);
      font-size: 0.95rem;
      opacity: 0.95;
    }

    main {
      width: 100%;
      max-width: 980px;
      margin: 0 auto;
      padding: 26px 18px 18px;
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: calc(100vh - 86px);
    }

    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 0;
    }

    .messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
      padding: 2px 4px 8px;
      scroll-behavior: smooth;
    }

    .message-row {
      display: flex;
      width: 100%;
    }

    .message-row.assistant {
      justify-content: flex-start;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: min(78%, 720px);
      padding: 20px 22px;
      border-radius: var(--radius-lg);
      line-height: 1.45;
      font-size: 1rem;
      box-shadow: var(--shadow);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .assistant .bubble {
      background: linear-gradient(180deg, var(--panel-soft), var(--panel));
      color: var(--text);
      border: 1px solid var(--border);
      border-top-left-radius: 18px;
    }

    .user .bubble {
      background: var(--accent);
      color: #fff;
      border: none;
      border-top-right-radius: 18px;
      min-width: 120px;
      text-align: left;
    }

    .system-error {
      background: linear-gradient(180deg, var(--danger-soft), var(--danger));
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .composer {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 110px;
      gap: 12px;
      align-items: center;
    }

    .input {
      width: 100%;
      height: 60px;
      border: none;
      outline: none;
      border-radius: 18px;
      background: var(--input-bg);
      color: var(--input-text);
      padding: 0 18px;
      font-size: 1rem;
      box-shadow: var(--shadow);
    }

    .input::placeholder {
      color: #7a7a86;
    }

    .send-btn {
      height: 60px;
      border: none;
      border-radius: 18px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease;
      box-shadow: var(--shadow);
    }

    .send-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .send-btn:disabled {
      cursor: not-allowed;
      opacity: 0.65;
      transform: none;
    }

    .typing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.85);
      animation: blink 1.2s infinite ease-in-out;
    }

    .dot:nth-child(2) {
      animation-delay: 0.15s;
    }

    .dot:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes blink {
      0%, 80%, 100% {
        opacity: 0.25;
        transform: scale(0.9);
      }
      40% {
        opacity: 1;
        transform: scale(1);
      }
    }

    .footer-note {
      color: var(--text-soft);
      opacity: 0.75;
      font-size: 0.82rem;
      margin-top: 10px;
      text-align: center;
    }

    @media (max-width: 700px) {
      .brand {
        font-size: 1.7rem;
      }

      main {
        padding: 18px 12px 14px;
      }

      .bubble {
        max-width: 88%;
        font-size: 0.96rem;
        padding: 16px 18px;
      }

      .composer {
        grid-template-columns: 1fr 96px;
        gap: 10px;
      }

      .input,
      .send-btn {
        height: 56px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">PREXIA</div>
    <div class="subtitle">Assistente Clínico de Apoio à Decisão</div>
  </header>

  <main>
    <div class="chat-wrap">
      <div class="messages" id="messages"></div>

      <div class="composer">
        <input
          id="messageInput"
          class="input"
          type="text"
          placeholder="Digite sua pergunta clínica aqui..."
          autocomplete="off"
        />
        <button id="sendButton" class="send-btn">Enviar</button>
      </div>

      <div class="footer-note">
        Ferramenta de apoio, utilize julgamento clínico e protocolos institucionais.
      </div>
    </div>
  </main>

  <script>
    const API_URL = "https://prexia-api.prexia.com.br/chat";
    const STORAGE_KEY = "prexia_user_id";

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("messageInput");
    const sendButtonEl = document.getElementById("sendButton");

    function getOrCreateUserId() {
      const existing = localStorage.getItem(STORAGE_KEY);
      if (existing) return existing;

      const generated = "user_" + Math.random().toString(36).slice(2, 10);
      localStorage.setItem(STORAGE_KEY, generated);
      return generated;
    }

    const userId = getOrCreateUserId();

    function addMessage(text, role = "assistant", extraClass = "") {
      const row = document.createElement("div");
      row.className = `message-row ${role}`;

      const bubble = document.createElement("div");
      bubble.className = `bubble ${extraClass}`.trim();
      bubble.textContent = text;

      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      return row;
    }

    function addTypingIndicator() {
      const row = document.createElement("div");
      row.className = "message-row assistant";
      row.id = "typingRow";

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      const typing = document.createElement("div");
      typing.className = "typing";
      typing.innerHTML = `
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      `;

      bubble.appendChild(typing);
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTypingIndicator() {
      const typingRow = document.getElementById("typingRow");
      if (typingRow) typingRow.remove();
    }

    function extractAssistantText(data) {
  if (!data) return "Resposta vazia da API.";

  // resposta principal
  let resposta = "";

  if (data.resposta && data.resposta.trim()) {
    resposta = data.resposta.trim();
  } else if (
    data.clinical_response &&
    data.clinical_response.resposta
  ) {
    resposta = data.clinical_response.resposta;
  }

  // se tiver perguntas → adiciona na resposta
  if (
    data.clinical_response &&
    Array.isArray(data.clinical_response.perguntas) &&
    data.clinical_response.perguntas.length > 0
  ) {
    const perguntas = data.clinical_response.perguntas
      .map(p => "• " + p)
      .join("\n");

    return resposta + "\n\n" + perguntas;
  }

  return resposta || "Não foi possível interpretar a resposta da API.";
}
    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message) return;

      addMessage(message, "user");
      inputEl.value = "";
      inputEl.focus();

      sendButtonEl.disabled = true;
      addTypingIndicator();

      try {
        const response = await fetch(API_URL, {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    user_id: userId,
    message: message
  }),
  mode: "cors",
  credentials: "omit"
});

        const rawText = await response.text();

        if (!response.ok) {
          let detail = `Erro HTTP ${response.status}.`;
          try {
            const errorData = JSON.parse(rawText);
            if (errorData.detail) {
              detail += ` ${errorData.detail}`;
            }
          } catch (_) {
            if (rawText) {
              detail += ` ${rawText}`;
            }
          }
          throw new Error(detail);
        }

        let data;
        try {
          data = JSON.parse(rawText);
        } catch (error) {
          throw new Error("A API respondeu em formato inválido.");
        }

        const assistantText = extractAssistantText(data);
        removeTypingIndicator();
        addMessage(assistantText, "assistant");
      } catch (error) {
        removeTypingIndicator();
        addMessage(
          `Erro ao consultar a API.\n\n${error.message}`,
          "assistant",
          "system-error"
        );
        console.error("Erro no frontend:", error);
      } finally {
        sendButtonEl.disabled = false;
      }
    }

    sendButtonEl.addEventListener("click", sendMessage);

    inputEl.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
      }
    });

    addMessage(
      "Olá. Sou o PREXIA. Posso ajudar com protocolos de antibióticos, dose, duração, alertas e avaliação inicial do cenário clínico.",
      "assistant"
    );
  </script>
</body>
</html>
