<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PREXIA | Assistente Clínico</title>

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --bg: #081a4b;
  --bg-secondary: #0c1f57;
  --panel: #1b2f68;
  --panel-soft: #23397a;
  --border: rgba(255,255,255,0.08);
  --text: #fff;
  --accent: #ff7a00;
  --accent-hover: #ff8d22;
}

html, body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family: Arial, Helvetica, sans-serif;
  background: linear-gradient(180deg, var(--bg), var(--bg-secondary));
  color: var(--text);
}

/* APP */
.app-shell {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 270px;
  background: rgba(0,0,0,0.15);
  padding: 16px;
}

/* MAIN */
.main-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  height: 100vh; /* 🔥 importante */
}

/* HEADER */
header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
}

/* MAIN CONTENT */
main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0; /* 🔥 ESSENCIAL */
  padding: 16px;
}

/* CHAT */
.chat-shell {
  display: flex;
  flex-direction: column;
  flex: 1;
  min-height: 0;
}

/* WRAP */
.chat-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-radius: 16px;
  padding: 12px;
  overflow: hidden;
  background: rgba(255,255,255,0.04);
}

/* MESSAGES */
.messages {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-height: 0; /* 🔥 CORREÇÃO PRINCIPAL */
}

/* BUBBLES */
.message-row {
  display: flex;
}

.message-row.user {
  justify-content: flex-end;
}

.bubble {
  padding: 14px;
  border-radius: 16px;
  max-width: 80%;
}

.user .bubble {
  background: var(--accent);
}

.assistant .bubble {
  background: var(--panel);
}

/* INPUT */
.composer {
  display: flex;
  gap: 10px;
  margin-top: 10px;
}

.input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

.send-btn {
  width: 120px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: #fff;
}
</style>
</head>

<body>

<div class="app-shell">

  <div class="sidebar">
    <h2>PREXIA</h2>
  </div>

  <div class="main-panel">

    <header>
      Assistente Clínico
    </header>

    <main>

      <div class="chat-shell">

        <div class="chat-wrap">

          <div id="messages" class="messages"></div>

          <div class="composer">
            <input id="input" class="input" placeholder="Digite..." />
            <button onclick="sendMessage()" class="send-btn">Enviar</button>
          </div>

        </div>

      </div>

    </main>

  </div>

</div>

<script>
const messagesEl = document.getElementById("messages");
const inputEl = document.getElementById("input");

function addMessage(text, role){
  const row = document.createElement("div");
  row.className = "message-row " + role;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  row.appendChild(bubble);
  messagesEl.appendChild(row);

  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function sendMessage(){
  const text = inputEl.value.trim();
  if(!text) return;

  addMessage(text,"user");
  inputEl.value = "";

  setTimeout(()=>{
    addMessage("Resposta do PREXIA...","assistant");
  },500);
}
</script>

</body>
</html>
