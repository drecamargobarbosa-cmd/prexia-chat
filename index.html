<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PREXIA | Assistente Clínico</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #081a4b;
      --bg-secondary: #0c1f57;
      --panel: #1b2f68;
      --panel-soft: #23397a;
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --text-soft: #dce6ff;
      --accent: #ff7a00;
      --accent-hover: #ff8d22;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, var(--bg), var(--bg-secondary));
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .app-shell {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 260px;
      background: rgba(0, 0, 0, 0.2);
      padding: 20px;
    }

    .main-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      height: 100vh; /* 🔥 CORREÇÃO */
    }

    header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0; /* 🔥 CORREÇÃO */
      padding: 20px;
    }

    .chat-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0; /* 🔥 CORREÇÃO */
    }

    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 16px;
      overflow: hidden;
    }

    .messages {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
      min-height: 0; /* 🔥 CORREÇÃO PRINCIPAL */
    }

    .message-row {
      display: flex;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .bubble {
      padding: 14px;
      border-radius: 16px;
      max-width: 75%;
    }

    .user .bubble {
      background: var(--accent);
    }

    .assistant .bubble {
      background: var(--panel);
    }

    .composer {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }

    textarea {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
    }

    button {
      width: 120px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #fff;
    }
  </style>
</head>

<body>

<div class="app-shell">

  <div class="sidebar">
    <h2>PREXIA</h2>
    <button onclick="newChat()">Nova conversa</button>
  </div>

  <div class="main-panel">

    <header>
      Assistente Clínico
    </header>

    <main>

      <div class="chat-shell">

        <div class="chat-wrap">

          <div id="messages" class="messages"></div>

          <div class="composer">
            <textarea id="input"></textarea>
            <button onclick="send()">Enviar</button>
          </div>

        </div>

      </div>

    </main>

  </div>

</div>

<script>
const messages = document.getElementById("messages");
const input = document.getElementById("input");

function addMessage(text, role){
  const row = document.createElement("div");
  row.className = "message-row " + role;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = text;

  row.appendChild(bubble);
  messages.appendChild(row);

  messages.scrollTop = messages.scrollHeight;
}

function send(){
  const text = input.value.trim();
  if(!text) return;

  addMessage(text,"user");
  input.value = "";

  // simulação (mantém funcionamento)
  setTimeout(()=>{
    addMessage("Resposta do PREXIA...","assistant");
  },500);
}

input.addEventListener("keydown", function(e){
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    send();
  }
});

function newChat(){
  messages.innerHTML = "";
}
</script>

</body>
</html>
