<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PREXIA | Assistente Clínico</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--bg:#081a4b;
--bg2:#0c2a6b;
--panel:#1b2f68;
--panel-soft:#23397a;
--text:#ffffff;
--text-soft:#dce6ff;
--accent:#ff7a00;
--accent-strong:#ff5500;
--border:rgba(255,255,255,0.08);
--shadow:0 10px 30px rgba(0,0,0,0.25);
}

body{
font-family:Arial,Helvetica,sans-serif;
background:
radial-gradient(circle at top left,#1f5fb1 0%,transparent 30%),
radial-gradient(circle at top right,#ff7a00 0%,transparent 20%),
linear-gradient(180deg,var(--bg2),var(--bg));
color:var(--text);
min-height:100vh;
overflow:hidden;
}

.app-shell{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{
width:280px;
background:rgba(0,0,0,0.25);
backdrop-filter:blur(10px);
padding:16px;
display:flex;
flex-direction:column;
gap:16px;
border-right:1px solid var(--border);
}

.sidebar-top{
display:flex;
align-items:center;
justify-content:space-between;
}

.sidebar-logo-img{
width:48px;
filter:drop-shadow(0 6px 12px rgba(0,0,0,0.4));
}

.sidebar-brand{
display:flex;
align-items:center;
gap:10px;
}

.sidebar-brand-title{
color:var(--accent);
font-weight:800;
font-size:1.1rem;
}

.sidebar-button{
background:linear-gradient(180deg,var(--accent),var(--accent-strong));
border:none;
border-radius:14px;
padding:14px;
color:#fff;
font-weight:700;
cursor:pointer;
box-shadow:0 10px 20px rgba(255,90,0,0.25);
transition:0.2s;
}

.sidebar-button:hover{
transform:translateY(-2px);
}

/* HEADER */
header{
padding:16px 20px;
display:flex;
align-items:center;
gap:12px;
border-bottom:1px solid var(--border);
background:rgba(0,0,0,0.15);
backdrop-filter:blur(6px);
}

.header-logo{
width:50px;
}

.brand{
font-size:2rem;
font-weight:800;
color:var(--accent); /* 🔥 LARANJA */
}

.subtitle{
font-size:0.9rem;
color:var(--text-soft);
}

/* CHAT */
.main-panel{
flex:1;
display:flex;
flex-direction:column;
}

.chat-wrap{
flex:1;
display:flex;
flex-direction:column;
padding:20px;
}

.messages{
flex:1;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:12px;
}

/* BUBBLES */
.bubble{
max-width:75%;
padding:14px 16px;
border-radius:16px;
box-shadow:var(--shadow);
line-height:1.5;
}

.user{
align-self:flex-end;
background:linear-gradient(180deg,var(--accent),var(--accent-strong));
}

.assistant{
align-self:flex-start;
background:linear-gradient(180deg,var(--panel-soft),var(--panel));
border:1px solid var(--border);
}

/* INPUT */
.input-area{
display:flex;
gap:10px;
margin-top:12px;
}

textarea{
flex:1;
padding:14px;
border-radius:14px;
border:none;
background:#f2f2f5;
color:#333;
font-size:1rem;
}

.send{
background:linear-gradient(180deg,var(--accent),var(--accent-strong));
border:none;
color:#fff;
padding:0 20px;
border-radius:14px;
cursor:pointer;
font-weight:700;
}
</style>
</head>

<body>

<div class="app-shell">

<aside class="sidebar">
<div class="sidebar-top">
<div class="sidebar-brand">
<img src="assets/logo-prexia.png" class="sidebar-logo-img"/>
<div class="sidebar-brand-title">PREXIA</div>
</div>
</div>

<button id="newChatButton" class="sidebar-button">
Nova conversa
</button>

</aside>

<div class="main-panel">

<header>
<img src="assets/logo-prexia.png" class="header-logo"/>

<div>
<div class="brand">PREXIA</div>
<div class="subtitle">
Assistente Clínico Inteligente de Apoio à Prescrição
</div>
</div>
</header>

<div class="chat-wrap">

<div id="messages" class="messages"></div>

<div class="input-area">
<textarea id="messageInput"></textarea>
<button id="sendButton" class="send">Enviar</button>
</div>

</div>

</div>
</div>

<script>
const API_BASE="https://prexia-api.prexia.com.br";
const CHAT_URL=`${API_BASE}/chat`;
const RESET_URL=`${API_BASE}/reset`;
const STORAGE_KEY="prexia_user_id";

const messagesEl=document.getElementById("messages");
const inputEl=document.getElementById("messageInput");
const sendButtonEl=document.getElementById("sendButton");
const newChatButtonEl=document.getElementById("newChatButton");

function getOrCreateUserId(){
let id=localStorage.getItem(STORAGE_KEY);
if(!id){
id="user_"+Math.random().toString(36).slice(2);
localStorage.setItem(STORAGE_KEY,id);
}
return id;
}

let userId=getOrCreateUserId();

function addMessage(text,role){
const div=document.createElement("div");
div.className=`bubble ${role}`;
div.innerText=text;
messagesEl.appendChild(div);
messagesEl.scrollTop=messagesEl.scrollHeight;
}

async function sendMessage(){
const msg=inputEl.value.trim();
if(!msg)return;

addMessage(msg,"user");
inputEl.value="";

try{
const res=await fetch(CHAT_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({user_id:userId,message:msg})
});

const data=await res.json();
addMessage(data.resposta||"Sem resposta","assistant");

}catch(e){
addMessage("Erro ao conectar API","assistant");
}
}

async function startNewConversation(){
await fetch(`${RESET_URL}/${userId}`,{method:"POST"});
userId=getOrCreateUserId();
messagesEl.innerHTML="";
}

sendButtonEl.onclick=sendMessage;
newChatButtonEl.onclick=startNewConversation;
</script>

</body>
</html>
